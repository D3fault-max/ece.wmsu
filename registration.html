<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Electronics and Communication Engineering</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      min-height: 100vh; 
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6b11cb57, #2575fc);
      background-image: url("bgloginpage.png");
      background-size: cover;
      padding: 40px 0; 
    }

    /* Moving background shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      animation: float 10s infinite ease-in-out;
      z-index: 0;
    }

    .shape:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 15%; animation-duration: 12s; }
    .shape:nth-child(2) { width: 60px; height: 60px; bottom: 20%; right: 20%; animation-duration: 8s; }
    .shape:nth-child(3) { width: 150px; height: 150px; top: 50%; right: 10%; animation-duration: 15s; }
    .shape:nth-child(4) { width: 80px; height: 80px; bottom: 15%; left: 10%; animation-duration: 18s; }

    @keyframes float {
      0%   { transform: translateY(0) rotate(0); }
      50%  { transform: translateY(-30px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    /* Extended box */
    .register-container {
      background: rgba(255, 255, 255, 0.218);
      padding: 40px;
      border-radius: 20px;
      width: 900px; 
      max-width: 95%;
      display: flex;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px); 
    }

    /* Left side: Info */
    .register-info {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      border-radius: 15px;
      margin-right: 20px;
      color: white;
      text-align: center;
    }

    .register-info h1 {
      margin-bottom: 15px;
    }

    .register-info p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* Right side: Form */
    .register-form {
      flex: 1.5; 
      padding: 10px 20px;
    }

    .register-form h2 {
      margin-bottom: 20px;
      color: #6a11cb;
      text-align: center;
    }

    /* Input Grid System for multi-column inputs */
    .form-row {
      display: flex;
      gap: 15px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
      flex: 1;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #fff; 
      font-weight: 500;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.9);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .extra-links {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      color: white;
    }

    .extra-links a {
      color: #fdd835; 
      text-decoration: none;
      font-weight: bold;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>

  <div class="register-container">
    <div class="register-info">
      <h1>Join ECE Department</h1>
      <p>Create your student profile to manage your academic track, access exclusive contents, and build your portfolio.</p>
    </div>

    <div class="register-form">
      <h2>Sign Up</h2>
      <form id="registerForm" autocomplete="off">
        
        <div class="input-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="First Name, M.I., Last Name" required>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="" disabled selected>Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Prefer not to say</option>
            </select>
          </div>
          
          <div class="input-group">
            <label for="birthdate">Birthdate</label>
            <input type="date" id="birthdate" required>
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="year_level">Year Level</label>
            <select id="year_level" required>
              <option value="" disabled selected>Select Year Level</option>
              <option value="First Year">First Year</option>
              <option value="Second Year">Second Year</option>
              <option value="Third Year">Third Year</option>
              <option value="Fourth Year">Fourth Year</option>
            </select>
          </div>

          <div class="input-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" placeholder="e.g. 09123456789" required>
          </div>
        </div>

        <div class="input-group">
          <label for="address">Current Address</label>
          <input type="text" id="address" placeholder="House No., Street, Barangay, City" required>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="username">Username (For Login)</label>
            <input type="text" id="username" placeholder="Choose a unique username" required>
          </div>
          
          <div class="input-group">
            <label for="personal_email">Personal Email Address</label>
            <input type="email" id="personal_email" placeholder="student@email.com" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required>
        </div>

        <button type="submit" class="btn">Register Account</button>
        <div class="extra-links">
          <p>Already have an account? <a href="loginpage.html">Login</a></p>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = "https://xxzbuhvilxapebzzkmla.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Bp2vcEqzfxnGDhfrm_0Nqw_ipJ79QDb";
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      // Collect data fields from UI inputs
      const usernameInput = document.getElementById("username").value.trim().toLowerCase();
      const personalEmail = document.getElementById("personal_email").value.trim();
      const password = document.getElementById("password").value.trim();
      
      const fullName = document.getElementById("name").value.trim();
      const gender = document.getElementById("gender").value;
      const birthdate = document.getElementById("birthdate").value; 
      const yearLevel = document.getElementById("year_level").value;
      const contactNumber = document.getElementById("contact").value.trim();
      const address = document.getElementById("address").value.trim();

      // Background Engineering: Translate username into pseudo-email format for Supabase engine authorization compatibility
      const syntheticEmail = `${usernameInput}@ece.com`;

      // Pass 1: Sign up user into Supabase's login ledger using our background pseudo-email format
      const { data: authData, error: authError } = await supabase.auth.signUp({
        email: syntheticEmail,
        password: password
      });

      if (authError) {
        alert("Account Creation Failed: " + authError.message);
        return;
      }

      const user = authData.user;
      if (!user) {
        alert("Internal structural fallback error: Account creation stalled.");
        return;
      }

      // Pass 2: Write all details, INCLUDING their real personal email, into the profile information table
      const { error: profileError } = await supabase
        .from('profiles')
        .insert([
          {
            id: user.id, 
            full_name: fullName,
            gender: gender,
            birthdate: birthdate, 
            address: address,
            year_level: yearLevel,
            contact_number: contactNumber,
            personal_email: personalEmail // Saves their real email cleanly here!
          }
        ]);

      if (profileError) {
        alert("Account created, but Profile Setup Failed: " + profileError.message);
        console.error("Database Write Crash Context:", profileError);
      } else {
        alert("Registration Successful! Welcome to the ECE Department.");
        window.location.href = "loginpage.html";
      }
    });
  </script>
</body>
</html>
